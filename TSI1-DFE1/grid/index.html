<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exemplo Grid</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <header>HEADER</header>

    <aside>
      <p>Menu</p>
      <ul>
        <li>Home</li>
        <li>Sobre</li>
        <li>Contato</li>
      </ul>
    </aside>

    <main>
      <h2>Conteúdo</h2>

      <div class="grid-interno">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
      </div>
    </main>

    <footer>FOOTER</footer>
  </div>

</body>
</html>
