<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil Profissional</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- TOPO MOBILE -->
    <div class="topbar">Meu Perfil</div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>João Silva</h2>
      <nav>
        <a href="#">Sobre</a>
        <a href="#">Habilidades</a>
        <a href="#">Contato</a>
      </nav>
    </aside>

    <!-- CONTEÚDO -->
    <main class="content">
      <!-- SOBRE -->
      <section>
        <h1>Sobre mim</h1>
        <p>
          Sou um profissional focado em desenvolvimento web, com experiência em
          criação de interfaces modernas e responsivas.
        </p>
      </section>

      <!-- HABILIDADES -->
      <section>
        <h2>Habilidades</h2>
        <div class="skills">
          <div class="skill">HTML</div>
          <div class="skill">CSS</div>
          <div class="skill">JavaScript</div>
          <div class="skill">UI/UX</div>
        </div>
      </section>

      <!-- CONTATO -->
      <section>
        <h2>Contato</h2>
        <input type="text" placeholder="Seu nome" />
        <input type="email" placeholder="Seu email" />
        <textarea rows="5" placeholder="Sua mensagem"></textarea>
        <button>Enviar</button>
      </section>
    </main>
  </body>
</html>
